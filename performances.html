<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performances — Aditya Borkar</title>
  <style>
    @font-face {
      font-family: 'Zodiak';
      src: url('fonts/Zodiak-Variable.woff2') format('woff2-variations');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Zodiak';
      src: url('fonts/Zodiak-VariableItalic.woff2') format('woff2-variations');
      font-weight: 100 900;
      font-style: italic;
      font-display: swap;
    }
  </style>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #0b5aff;
      --bg: #fffff2;
      --rule: rgba(11, 90, 255, 0.22);
    }

    ::selection {
      background: rgba(11, 90, 255, 0.15);
    }

    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--blue);
      font-family: 'Zodiak', Georgia, serif;
      font-size: 18px;
      font-weight: 400;
      line-height: 1.25;
      letter-spacing: -0.03em;
      -webkit-font-smoothing: antialiased;
      cursor: none;
    }

    * { cursor: none !important; }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ── CUSTOM CURSOR ─────────────────────────────────────── */
    #cursor {
      position: fixed;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--blue);
      opacity: 0.7;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.08s ease, opacity 0.15s ease;
      will-change: transform;
    }

    #cursor.hovering {
      transform: translate(-50%, -50%) scale(2.2);
      opacity: 0.4;
    }

    /* ── NAV ───────────────────────────────────────────────── */
    .nav {
      padding: 44px 52px 0;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .nav-name {
      font-size: 22px;
      font-weight: 400;
      letter-spacing: -0.3px;
      transition: opacity 0.15s;
    }

    .nav-name:hover {
      opacity: 0.5;
    }

    .nav-back {
      font-size: 18px;
      letter-spacing: -0.3px;
      transition: opacity 0.15s;
    }

    .nav-back:hover {
      opacity: 0.5;
    }

    /* ── PAGE CONTENT ──────────────────────────────────────── */
    .content {
      padding: 80px 52px 100px;
    }

    /* ── SECTION ───────────────────────────────────────────── */
    .section {
      margin-bottom: 80px;
    }

    .section-heading {
      font-size: 32px;
      font-weight: 400;
      letter-spacing: -0.5px;
      line-height: 1.2;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 8px;
    }

    .section-subheading {
      font-size: 16px;
      opacity: 0.55;
      margin-bottom: 24px;
      letter-spacing: -0.3px;
    }

    /* ── VIDEO EMBED ───────────────────────────────────────── */
    .video-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      overflow: hidden;
    }

    .video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── COLLAGE GRID ──────────────────────────────────────── */
    .collage-grid {
      columns: 4;
      column-gap: 10px;
    }

    .collage-item {
      break-inside: avoid;
      margin-bottom: 10px;
      overflow: hidden;
      background: rgba(11, 90, 255, 0.06);
      position: relative;
      cursor: none;
    }

    .collage-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: opacity 0.2s ease;
    }

    .collage-item:hover img {
      opacity: 0.88;
    }

    /* Empty placeholder */
    .collage-item:not(:has(img)) {
      aspect-ratio: var(--ratio, 1 / 1.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .collage-item:not(:has(img))::after {
      content: '+';
      font-size: 22px;
      opacity: 0.2;
      color: var(--blue);
    }

    .collage-item:nth-child(3n)   { --ratio: 1 / 0.75; }
    .collage-item:nth-child(3n+1) { --ratio: 1 / 1.4;  }
    .collage-item:nth-child(3n+2) { --ratio: 1 / 1;    }

    /* ── RESPONSIVE ────────────────────────────────────────── */
    @media (max-width: 860px) {
      .nav { padding: 32px 28px 0; }
      .content { padding: 48px 28px 60px; }
      .section-heading { font-size: 24px; }
      .collage-grid { columns: 2; column-gap: 6px; }
      .collage-item { margin-bottom: 6px; }
    }
  </style>
</head>

  <script>
    const cursor = document.getElementById('cursor');

    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });

    document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
    document.addEventListener('mouseenter', () => cursor.style.opacity = '0.7');

    document.querySelectorAll('[data-hover], a, button').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
    });
  </script>
